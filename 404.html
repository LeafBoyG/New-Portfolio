<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - Alfred Duckworth</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; overflow: hidden;">

    <div style="position: absolute; top:0; left:0; width:100%; height:100%; z-index:-1; background-image: radial-gradient(var(--border-color) 1px, transparent 1px); background-size: 40px 40px; opacity: 0.5;"></div>

    <div class="reveal">
        <h1 style="font-size: 8rem; color: var(--dark-green); font-family: 'Playfair Display', serif; line-height: 1;">404</h1>
        <p style="font-size: 1.5rem; margin-bottom: 2rem; color: var(--text-muted);">Out of focus.</p>
        <p style="margin-bottom: 3rem; max-width: 400px; margin-left: auto; margin-right: auto;">The page you are looking for has been moved, deleted, or never existed.</p>
        
        <a href="index.html" class="cta-button magnetic-btn">Return Home</a>
    </div>

    <script src="script.js"></script>
</body>
</html>
